<!DOCTYPE html>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
/* HOT SONGS */
.hot-songs {
  padding: 0px;
  background: white;
}

.hot-songs h2 {
  text-align: center;
  color: #f5c518;
}

/* GRID */
.songs-container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

/* SONG CARD */
.song-card {
  position: relative;
  overflow: hidden;
  border-radius: 0px;
}

.song-card img {
  width: 100%;
  height: 400px;
  object-fit: cover;
}

/* OVERLAY */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  padding: 10px;
}

.overlay audio {
  width: 100%;
}

/* HOVER EFFECT */
.song-card:hover {
  transform: scale(1.03);
  transition: 0.3s;
}

/* MOBILE */
@media (max-width: 768px) {
  .songs-container {
    display: block;
  }

  .song-card {
    margin-bottom: 15px;
  }

  .song-card img {
    height: 400px;
  }
}
  </style>
</head>

<body>
